# AutoMind — Neo4j only, for local KG development/testing.
# Full docker-compose.yml (API + Neo4j + frontend together) comes in the
# containerization step later. For now this just gets you a working graph
# database to point kg_builder.py / kg_query.py at.
#
# Run:   docker compose -f docker/docker-compose.neo4j.yml up -d
# Stop:  docker compose -f docker/docker-compose.neo4j.yml down
# Neo4j Browser: http://localhost:7474  (user: neo4j / password: automind123)

services:
  neo4j:
    image: neo4j:5.23-community
    container_name: automind-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (web UI)
      - "7687:7687"   # Bolt protocol (used by the Python driver)
    environment:
      - NEO4J_AUTH=neo4j/automind123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data: